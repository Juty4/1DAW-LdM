<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas ordenadas con Pseudo-elementos y Pseudo-clases</title>
    <style>
        ol{
            list-style-type: none;
            padding-left: 40px;

            li{
                margin-bottom: 5px;
                &::before{
                    content: "☑";
                }
                /*3n (cada 3) y el +2(empieza desde el segundo a hacerlo)*/
                &:nth-child(3n+2){
                    background-color: blueviolet;
                }
            }
        }
    </style>
</head>
<body>
    <ol>
        <li>Paso 1</li>
        <li>Paso 2</li>
        <li>Paso 3</li>
        <li>Paso 4</li>
        <li>Paso 5</li>
    </ol>
</body>
</html>
