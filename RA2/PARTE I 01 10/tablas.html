<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
    <style>
        table{
            width: 100%;

        }
        table, th, td{
            border:1px solid black;
            border-collapse:separate;
           /* background-color: aquamarine; */
            border-radius: 10px;

        }
        th, td{
            background-color: gold;
           /*border-radius: 10px;*/
        }

    </style>
</head>
<body>
    <table>
        <caption>NOTAS DE LOS ALUMNOS</caption>
        <tr>
            <th style="width: 45%">Nombre</th>
            <th style="width: 45%">Apellidos</th>
            <th style="width: 10%">Nota</th>
        </tr>
        <tr>
            <td>Pantoja</td>
            <td>Ruiz Cano</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Pedro</td>
            <td>Sánchez</td>
            <td>2</td>
        </tr>
        <tr style="height: 150px;">
            <td>Guillermo</td>
            <td>Palazón Cano</td>
            <td>4</td>
        </tr>
        <tr>
            <td>Justin</td>
            <td>Bieber</td>
            <td>9</td>
        </tr>

    </table>
    <hr>
    <table>
    <caption>TABLA CABECERA COLUMNA</caption>
        <tr>
            <th style="width: 45%">Nombre</th>
            <td style="width: 45%">Guillermo</td>
            <td style="width: 10%">Antonio</td>
        </tr>
        <tr>
            <th>Apellido</th>
            <td>Ruiz Cano</td>
            <td>Sánchez</td>
        </tr>
        <tr>
            <th>Nota</td>
            <td>3</td>
            <td>2</td>
        </tr>


    </table>
</body>
</html>
