<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas, Pseudo-clases y Pseudo-elementos</title>
    <style>
        table{
            border-collapse: collapse;
            width:100%;

            tr{

                td{
                    border: 1px solid gainsboro;     
                    padding:10px;
                    /*selecciona la primera celda de cada fila*/
                    &:nth-of-type(1){
                        background-color: yellowgreen;
                        &::before{
                            content: "🎵";
                        }
                    }

                    &:nth-of-type(2){
                        text-align: right;
                        &::after{
                            content: " (derecha)";
                            color: blue;
                            font-size: small;
                        }
                    }
                }
                &:first-of-type{
                th{                   
                        background-color: aquamarine;
                        color:white;
                        &::before{
                            content:"⚽"
                        }
                    }
                }
            }
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Encabezado 1</th>
            <th>Encabezado 2</th>
        </tr>
        <tr>
            <td>Celda1</td>
            <td>Celda2</td>
        </tr>
        <tr>
            <td>Celda3</td>
            <td>Celda4</td>
        </tr>
    </table>
</body>
</html>
